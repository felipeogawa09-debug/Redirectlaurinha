<script>
    const scissor = document.getElementById('scissor');
    const present = document.getElementById('present');
    const overlay = document.getElementById('dragArea');
    const celebration = document.getElementById('celebration');
    const successMsg = document.getElementById('successMsg');
    
    let isDragging = false;
    let offsetX, offsetY;

    const destUrl = new URL('https://t.me/LaurinhaKalimannbot');' + window.location.search;

    function startDrag(e) {
        isDragging = true;
        scissor.classList.add('dragging');
        
        // Determina as coordenadas iniciais para o arrasto
        if (e.type === 'mousedown') {
            offsetX = e.clientX - scissor.getBoundingClientRect().left;
            offsetY = e.clientY - scissor.getBoundingClientRect().top;
        } else if (e.type === 'touchstart') {
            offsetX = e.touches[0].clientX - scissor.getBoundingClientRect().left;
            offsetY = e.touches[0].clientY - scissor.getBoundingClientRect().top;
        }
    }

    function drag(e) {
        if (!isDragging) return;
        e.preventDefault(); // Impede rolagem da página em touch

        let clientX, clientY;
        if (e.type === 'mousemove') {
            clientX = e.clientX;
            clientY = e.clientY;
        } else if (e.type === 'touchmove') {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        }

        scissor.style.left = (clientX - offsetX) + 'px';
        scissor.style.top = (clientY - offsetY) + 'px';
        scissor.style.transform = 'none'; // Remove o translate(-50%, -50%) durante o arrasto

        checkOverlap();
    }

    function endDrag() {
        if (!isDragging) return;
        isDragging = false;
        scissor.classList.remove('dragging');
        present.classList.remove('highlight'); // Remove destaque do presente

        // Se a tesoura for solta longe do presente, ela volta para a posição inicial
        if (!checkOverlap(false)) { 
            scissor.style.transition = 'top 0.3s ease-out, left 0.3s ease-out, transform 0.3s ease-out';
            scissor.style.left = '50%';
            scissor.style.top = '15%';
            scissor.style.transform = 'translate(-50%, -50%)';
            setTimeout(() => { scissor.style.transition = 'none'; }, 300); // Remove transition para evitar conflito com arrasto
        }
    }

    function checkOverlap(applyHighlight = true) {
        const scissorRect = scissor.getBoundingClientRect();
        const presentRect = present.getBoundingClientRect();

        const overlap = !(
            scissorRect.right < presentRect.left || 
            scissorRect.left > presentRect.right || 
            scissorRect.bottom < presentRect.top || 
            scissorRect.top > presentRect.bottom
        );

        if (overlap && applyHighlight) {
            present.classList.add('highlight'); // Destaca o presente quando a tesoura está sobre ele
        } else if (!overlap && applyHighlight) {
            present.classList.remove('highlight');
        }

        return overlap;
    }

    // Função de verificação final ao soltar

        endDrag(); // Finaliza o arrasto visualmente

        if (checkOverlap(false)) { // Verifica sobreposição sem aplicar highlight
            // Tesoura está sobre o presente!

                }, 1000); // Espera 1 segundo após "PARABÉNS!"
            }, 800); // Espera 0.8s para a animação de celebração
        }
    }

    // Eventos para Desktop

    overlay.addEventListener('mousemove', drag);
    overlay.addEventListener('mouseup', dropCheck);

    overlay.addEventListener('touchmove', drag, { passive: false });
    overlay.addEventListener('touchend', dropCheck);
    overlay.addEventListener('touchcancel', dropCheck); // Caso o toque seja interrompido
