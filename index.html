<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responda para Entrar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0a;
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            font-size: 1rem;
            margin-bottom: 25px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- ÁREA DA CARTA --- */
        .card-wrapper {
            position: relative;
            width: 280px;
            height: 380px;
            touch-action: none;
            z-index: 10;
        }

        .card {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #1e1e1e, #111);
            border: 2px solid #333;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            cursor: grab;
            position: absolute;
            z-index: 5;
            transition: transform 0.1s ease-out;
        }

        .card:active { cursor: grabbing; }
        .card-icon { font-size: 70px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(255,69,0,0.3)); }
        .card-text { font-size: 1.4rem; font-weight: bold; line-height: 1.3; color: #fff; }

        /* Selos (aparecem ao arrastar) */
        .stamp {
            position: absolute;
            top: 30px;
            padding: 5px 15px;
            border: 4px solid;
            border-radius: 10px;
            font-weight: 900;
            font-size: 2.2rem;
            text-transform: uppercase;
            opacity: 0;
            z-index: 6;
        }
        .stamp.like { right: 20px; border-color: #00ffb3; color: #00ffb3; transform: rotate(-15deg); }
        .stamp.nope { left: 20px; border-color: #00e5ff; color: #00e5ff; transform: rotate(15deg); }

        /* --- INDICADORES INFERIORES (NOVIDADE) --- */
        .action-hints {
            display: flex;
            justify-content: space-between;
            width: 280px;
            margin-top: 30px;
            gap: 20px;
        }

        .hint-box {
            flex: 1;
            padding: 12px;
            border-radius: 15px;
            border: 1px solid #333;
            background: rgba(255, 255, 255, 0.03);
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
        }

        .hint-box.left { color: #00e5ff; border-color: rgba(0, 229, 255, 0.2); }
        .hint-box.right { color: #00ffb3; border-color: rgba(0, 255, 179, 0.2); }

        .hint-box span { font-size: 1.2rem; }

        /* --- ANIMAÇÃO DA MÃO --- */
        .hand-tutorial {
            position: absolute;
            bottom: -60px;
            left: 50%;
            font-size: 40px;
            pointer-events: none;
            animation: swipe-hint 3s infinite;
            z-index: 1;
        }

        @keyframes swipe-hint {
            0% { transform: translate(-50%, 0); opacity: 0; }
            20% { opacity: 1; }
            40% { transform: translate(50px, -10px) rotate(15deg); opacity: 1; }
            60% { transform: translate(-80px, -10px) rotate(-15deg); opacity: 1; }
            80%, 100% { opacity: 0; }
        }

    </style>
</head>
<body>

<div class="container">
    <h2>Deslize para responder</h2>

    <div class="card-wrapper" id="cardArea">
        <div class="card" id="mainCard">
            <div class="stamp like" id="stampLike">SIM</div>
            <div class="stamp nope" id="stampNope">CLARO</div>

            <div class="card-icon">🔥</div>
            <div class="card-text">Você está pronto para o que vem a seguir?</div>
        </div>
        
        <div class="hand-tutorial">👆</div>
    </div>

    <div class="action-hints">
        <div class="hint-box left" id="hintLeft">
            <span>⬅️</span>
            CLARO
        </div>
        <div class="hint-box right" id="hintRight">
            <span>➡️</span>
            SIM
        </div>
    </div>
</div>

<script>
    const card = document.getElementById('mainCard');
    const stampLike = document.getElementById('stampLike');
    const stampNope = document.getElementById('stampNope');
    const hintLeft = document.getElementById('hintLeft');
    const hintRight = document.getElementById('hintRight');
    
    let startX = 0;
    let currentX = 0;
    let isDragging = false;
    
    const redirectUrl = 'https://www.instagram.com/01dohot/' + window.location.search;

    function startDrag(x) {
        startX = x;
        isDragging = true;
        card.style.transition = 'none';
    }

    function moveDrag(x) {
        if (!isDragging) return;
        currentX = x - startX;
        
        const rotation = currentX / 12;
        card.style.transform = `translateX(${currentX}px) rotate(${rotation}deg)`;

        // Efeito visual nos selos e nas caixas inferiores
        if (currentX > 50) {
            stampLike.style.opacity = Math.min(currentX / 150, 1);
            stampNope.style.opacity = 0;
            hintRight.style.background = `rgba(0, 255, 179, 0.15)`;
            hintLeft.style.background = `transparent`;
        } else if (currentX < -50) {
            stampNope.style.opacity = Math.min(Math.abs(currentX) / 150, 1);
            stampLike.style.opacity = 0;
            hintLeft.style.background = `rgba(0, 229, 255, 0.15)`;
            hintRight.style.background = `transparent`;
        } else {
            stampLike.style.opacity = 0;
            stampNope.style.opacity = 0;
            hintLeft.style.background = `rgba(255, 255, 255, 0.03)`;
            hintRight.style.background = `rgba(255, 255, 255, 0.03)`;
        }
    }

    function endDrag() {
        if (!isDragging) return;
        isDragging = false;
        
        if (Math.abs(currentX) > 120) {
            const direction = currentX > 0 ? 1 : -1;
            card.style.transition = 'transform 0.5s ease-in';
            card.style.transform = `translateX(${direction * 1000}px) rotate(${direction * 45}deg)`;
            
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 300);
        } else {
            card.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            card.style.transform = 'translateX(0px) rotate(0deg)';
            stampLike.style.opacity = 0;
            stampNope.style.opacity = 0;
            hintLeft.style.background = `rgba(255, 255, 255, 0.03)`;
            hintRight.style.background = `rgba(255, 255, 255, 0.03)`;
        }
    }

    // Mouse
    card.addEventListener('mousedown', (e) => startDrag(e.clientX));
    window.addEventListener('mousemove', (e) => moveDrag(e.clientX));
    window.addEventListener('mouseup', endDrag);

    // Touch
    card.addEventListener('touchstart', (e) => startDrag(e.touches[0].clientX));
    card.addEventListener('touchmove', (e) => {
        moveDrag(e.touches[0].clientX);
        if (Math.abs(currentX) > 10) e.preventDefault(); // Evita scroll ao arrastar
    }, { passive: false });
    window.addEventListener('touchend', endDrag);

</script>

    const currentParams = new URLSearchParams(window.location.search);
    const destUrl = new URL('https://t.me/LaurinhaKalimannbot'););
    currentParams.forEach((value, key) => {
      destUrl.searchParams.append(key, value);
    });
    const finalUrl = destUrl.toString();
    
    // URL de destino disponível na variável finalUrl
    // O usuário deve clicar em um botão/link para redirecionar
  </script>
</body>
</html>
